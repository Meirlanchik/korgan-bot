services:
  app:
    build: .
    container_name: kaspi-price-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./html:/app/public
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./kaspi-downloads:/app/kaspi-downloads
      - ./kaspi-session:/app/kaspi-session
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: kaspi-web-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
